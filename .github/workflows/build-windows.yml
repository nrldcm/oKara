name: Build Windows app

# Builds the Windows desktop app (installer + portable .exe).
#
#  • Push a version tag (e.g. `v0.1.0`) → builds AND publishes a GitHub
#    Release with the .exe files and SHA-256 checksums attached.
#  • Manual run (workflow_dispatch) → same, by default: builds and publishes a
#    Release tagged `v<package.json version>` (the workflow creates the tag).
#    Untick the "publish" input to get a test build (artifacts only).
#
# See RELEASING.md for the full versioned-release process.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish a GitHub Release (tag v<package.json version>)'
        type: boolean
        default: true
  push:
    tags: ['v*']

permissions:
  contents: write # required to create the GitHub Release (and its tag)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read package.json version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG_VERSION="v${{ steps.pkg.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          echo "package.json = $PKG_VERSION, tag = $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION. Bump the version and re-tag."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate SPA for Electron
        run: npx nuxt generate
        env:
          NUXT_APP_BASE_URL: ./

      - name: Install Electron toolchain
        run: npm install --no-save electron electron-builder

      - name: Build Windows installer + portable
        run: npx electron-builder --win --publish never

      - name: Generate SHA-256 checksums
        shell: bash
        working-directory: dist-electron
        run: |
          sha256sum *.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: okara-windows
          path: |
            dist-electron/*.exe
            dist-electron/SHA256SUMS.txt
          if-no-files-found: error

      # Runs on tag pushes, and on manual runs unless "publish" was unticked.
      # On a manual run the tag v<version> is created by the release action at
      # the built commit if it doesn't exist yet.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.exe
            dist-electron/SHA256SUMS.txt
