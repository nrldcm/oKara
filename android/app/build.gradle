apply plugin: 'com.android.application'

// package.json is the single source of truth for the app version (SemVer).
def pkgJson = new groovy.json.JsonSlurper().parse(file('../../package.json'))
def pkgVersionParts = pkgJson.version.tokenize('.').collect { it.toInteger() }

android {
    namespace = "com.okara.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.okara.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode pkgVersionParts[0] * 1000000 + pkgVersionParts[1] * 1000 + pkgVersionParts[2]
        versionName pkgJson.version
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17', '-O2'
                arguments '-DANDROID_STL=c++_shared' // Oboe's prefab ships against the shared STL
            }
        }
    }
    buildFeatures {
        prefab true // Oboe ships prebuilt via Prefab
    }
    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }
    signingConfigs {
        release {
            // Self-signed key for sideloaded builds; keeps the signature stable
            // so updates install over previous versions. Use a private keystore
            // instead if this app is ever published to a store.
            storeFile file('../okara-release.keystore')
            storePassword 'okara-release'
            keyAlias 'okara'
            keyPassword 'okara-release'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

// The phone-remote page is shared with Electron; copy it into assets so the
// native RemoteServer can serve it (single source of truth in electron/).
tasks.register('copyRemoteHtml', Copy) {
    from '../../electron/remote.html'
    into 'src/main/assets'
}
preBuild.dependsOn 'copyRemoteHtml'

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "org.nanohttpd:nanohttpd-websocket:2.3.1" // LAN phone-remote server
    implementation "androidx.documentfile:documentfile:1.1.0" // SAF folder imports
    implementation "org.bouncycastle:bcprov-jdk18on:1.78.1" // self-signed TLS for HTTPS remote
    implementation "org.bouncycastle:bcpkix-jdk18on:1.78.1"
    implementation "com.google.oboe:oboe:1.8.1" // low-latency native audio (monitor engine)
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
