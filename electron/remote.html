<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>okara remote</title>
<style>
  :root {
    --bg: #0e0e18; --surface: #1c1c33; --surface2: #26264a; --border: #2b2b46; --text: #f4f4fb;
    --muted: #a2a2c0; --faint: #6d6d8a; --accent1: #ff5da2; --accent2: #ff9d5d; --danger: #e0455e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6fb; --surface: #ffffff; --surface2: #eceef6; --border: #e0e2ee; --text: #191a2e;
      --muted: #5c5e77; --faint: #9a9cb2; --accent1: #ff4d97; --accent2: #ff8a45; --danger: #d83a54;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 20px 18px 30px;
    max-width: 460px; margin: 0 auto; }
  .ic { width: 1em; height: 1em; display: inline-block; vertical-align: -.125em; fill: currentColor; }
  h1 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
  .tabs { display: flex; gap: 8px; width: 100%; }
  .tabs button { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; font-size: 14px; opacity: .7; display: flex; align-items: center;
    justify-content: center; gap: 6px; }
  .tabs button.active { opacity: 1; background: var(--surface2); font-weight: 600; }
  .count { background: var(--accent1); color: #fff; border-radius: 999px; font-size: 11px; padding: 1px 7px; margin-left: 4px; }
  .now { text-align: center; min-height: 44px; display: flex; flex-direction: column; }
  .now strong { font-size: 19px; }
  .now span { color: var(--muted); }
  .display { display: flex; align-items: center; gap: 10px; width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; }
  .display .num { flex: 1; font-size: 34px; font-weight: 800; letter-spacing: 6px; text-align: center; color: var(--accent1); }
  .display .bs { border: none; background: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
  .key { height: 60px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; }
  .key.sub { font-size: 20px; color: var(--muted); }
  .dial-actions { display: flex; gap: 12px; width: 100%; }
  .act { flex: 1; height: 52px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer;
    color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .act.play { background: linear-gradient(135deg, var(--accent1), var(--accent2)); }
  .act.reserve { background: var(--surface2); color: var(--text); }
  .transport { display: flex; align-items: center; gap: 16px; margin-top: 4px; }
  .btn { border: 1px solid var(--border); border-radius: 50%; width: 60px; height: 60px; font-size: 22px;
    background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn.big { width: 76px; height: 76px; font-size: 30px; border: none;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
  .row { display: flex; gap: 12px; width: 100%; }
  .btn.wide { width: 100%; height: 50px; border-radius: 14px; font-size: 15px; gap: 8px; }
  .btn.stop { background: var(--danger); color: #fff; border: none; }
  .vol { display: flex; align-items: center; gap: 12px; width: 100%; font-size: 18px; color: var(--muted); }
  .vol input { flex: 1; accent-color: var(--accent1); }
  .vol-label { display: flex; align-items: center; gap: 6px; font-size: 13px; white-space: nowrap; }
  .queue { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .q-empty { color: var(--faint); text-align: center; padding: 20px 0; }
  .q-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; }
  .q-num { font-weight: 700; color: var(--accent1); font-size: 14px; }
  .q-info { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .q-info strong { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-info span { font-size: 12px; color: var(--muted); }
  .q-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); cursor: pointer; font-size: 15px; }
  .q-btn.del { color: var(--danger); }
  .q-btn.yes { width: auto; padding: 0 14px; background: var(--danger); color: #fff; border: none; }
  .q-btn.no { width: auto; padding: 0 14px; }
  .q-confirm { font-size: 13px; color: var(--muted); }
  .flash { min-height: 20px; color: var(--accent1); font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .2s; }
  .flash.show { opacity: 1; }
  .status { color: var(--faint); font-size: 13px; margin-top: auto; }
  .hidden { display: none !important; }
  .mic { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .mic-modes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .mode { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 6px;
    border-radius: 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text);
    cursor: pointer; font-size: 13px; font-weight: 600; }
  .mode .ic { font-size: 18px; }
  .mode.active { background: var(--accent1); color: #fff; border-color: var(--accent1); }
  .mode.off.active { background: var(--danger); border-color: var(--danger); }
  .mic-hint { font-size: 12px; color: var(--muted); text-align: center; min-height: 15px; margin-top: -6px; }
  .monitor { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 600; font-size: 15px; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; font-size: 13px; }
  .preset.active { background: var(--accent1); color: #fff; border-color: var(--accent1); }
  .sliders { display: flex; flex-direction: column; gap: 12px; }
  .fx-slider { display: flex; flex-direction: column; gap: 6px; }
  .fx-slider .top { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
  .fx-slider .top em { font-style: normal; color: var(--text); }
  .fx-slider input { width: 100%; accent-color: var(--accent1); }
  .songs { width: 100%; display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }
  .song-search { width: 100%; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 15px; }
  .song-fields { display: flex; gap: 6px; }
  .song-field { flex: 1; padding: 7px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; font-size: 13px; }
  .song-field.active { background: var(--accent1); color: #fff; border-color: var(--accent1); }
  .song-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .sg-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 10px; }
  .sg-num { font-weight: 700; color: var(--accent1); font-size: 13px; white-space: nowrap; }
  .sg-info { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .sg-info strong { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sg-info span { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sg-btn { width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; background: var(--surface2); color: var(--text); }
  .sg-btn.play { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
  .sg-note { color: var(--faint); font-size: 12px; text-align: center; padding: 8px 0; }
  .sing { width: 100%; margin-top: 6px; padding: 14px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--surface2); color: var(--text); }
  .sing.on { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
  .sing-hint { font-size: 12px; color: var(--muted); text-align: center; min-height: 15px; }
</style>
</head>
<body>
  <h1><span data-icon="mic-fill"></span> okara remote</h1>
  <div class="tabs">
    <button id="tab-remote" class="active" onclick="setTab('remote')"><span data-icon="grid-3x3-gap-fill"></span> Remote</button>
    <button id="tab-songs" onclick="setTab('songs')"><span data-icon="search"></span> Songs</button>
    <button id="tab-queue" onclick="setTab('queue')"><span data-icon="list-ul"></span> Queue<span class="count hidden" id="qcount"></span></button>
    <button id="tab-mic" onclick="setTab('mic')"><span data-icon="mic-fill"></span> Mic</button>
  </div>
  <div class="now" id="now"><em style="opacity:.5">Connecting…</em></div>

  <div id="remoteTab" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:14px">
    <div class="display">
      <span class="num" id="num">––––</span>
      <button class="bs" onclick="backspace()"><span data-icon="backspace-fill"></span></button>
    </div>
    <div class="keypad" id="keypad"></div>
    <div class="dial-actions">
      <button class="act play" onclick="playNumber()"><span data-icon="play-fill"></span> Play</button>
      <button class="act reserve" onclick="reserveNumber()"><span data-icon="plus-lg"></span> Reserve</button>
    </div>
    <div class="transport">
      <button class="btn" onclick="cmd('prev')"><span data-icon="skip-start-fill"></span></button>
      <button class="btn big" id="toggle" onclick="cmd('toggle')"><span data-icon="play-fill"></span></button>
      <button class="btn" onclick="cmd('next')"><span data-icon="skip-end-fill"></span></button>
    </div>
    <div class="row">
      <button class="btn wide" onclick="cmd('restart')"><span data-icon="arrow-clockwise"></span> Restart</button>
      <button class="btn wide stop" onclick="cmd('stop')"><span data-icon="stop-fill"></span> Stop</button>
    </div>
    <label class="vol"><span class="vol-label"><span data-icon="music-note-beamed"></span> Music</span>
      <input type="range" min="0" max="1" step="0.01" value="1" oninput="cmd('volume', Number(this.value))" />
      <span data-icon="volume-up-fill"></span></label>

    <button class="sing" id="singBtn" onclick="toggleMic()">
      <span data-icon="mic-fill"></span> <span id="singLabel">Sing — use this phone as mic</span>
    </button>
    <p class="sing-hint" id="singHint"></p>
  </div>

  <div id="queueTab" class="queue hidden"></div>

  <div id="songsTab" class="songs hidden">
    <input id="songSearch" class="song-search" type="search" placeholder="Search number, song, or artist…" />
    <div class="song-fields" id="songFields"></div>
    <div id="songList" class="song-list"></div>
  </div>

  <div id="micTab" class="mic hidden">
    <div class="mic-modes" id="micModes"></div>
    <p class="mic-hint" id="micHint"></p>
    <label class="monitor">
      <input type="checkbox" id="monitorBox" onchange="cmd('fx-monitor', this.checked ? 1 : 0)" />
      <span><span data-icon="headphones"></span> Hear my voice (live monitor)</span>
    </label>
    <div class="presets" id="fxPresets"></div>
    <div class="sliders" id="fxSliders"></div>
  </div>

  <p class="flash" id="flash"></p>
  <p class="status" id="status">…</p>

<script>
  var ICONS = {

  function svg(name) { return '<svg class="ic" viewBox="0 0 16 16">' + (ICONS[name] || '') + '</svg>' }

  var flashEl = document.getElementById('flash')

  function setTab(t) {

    document.getElementById('remoteTab').className = t === 'remote' ? '' : 'hidden'
    document.getElementById('songsTab').className = t === 'songs' ? 'songs' : 'songs hidden'
    queueTab.className = t === 'queue' ? 'queue' : 'queue hidden'
    document.getElementById('micTab').className = t === 'mic' ? 'mic' : 'mic hidden'
    renderQueue()
    renderSongs()
  }
  function press(d) { if (dialed.length < 8) { dialed += d; renderDial() } }
  function backspace() { dialed = dialed.slice(0, -1); renderDial() }
  function clearDial() { dialed = ''; renderDial() }
  function renderDial() { numEl.textContent = dialed || '––––' }
  function playNumber() { if (dialed) { cmd('play-number', Number(dialed)); clearDial() } }
  function reserveNumber() { if (dialed) { cmd('reserve-number', Number(dialed)); clearDial() } }

  function connect() {
    var wsScheme = location.protocol === 'https:' ? 'wss://' : 'ws://'
    ws = new WebSocket(wsScheme + location.host + '/ws?t=' + token)
    ws.onopen = function () { status.textContent = 'Connected' }
    ws.onclose = function () { status.textContent = 'Disconnected — retrying…'; setTimeout(connect, 1500) }
    ws.onmessage = function (e) {
      try {
        var msg = JSON.parse(e.data)
        if (msg.type === 'state') render(msg.state)
        if (msg.type === 'songs') { songBook = msg.songs || []; renderSongs() }
      } catch (err) {}
    }
  }

  // ---- Songs tab: searchable songbook synced from the host ----
  var songBook = []
  var SONG_LIMIT = 80
  var songField = 'all'
  document.getElementById('songSearch').addEventListener('input', renderSongs)
  ;[['all','All'],['number','No.'],['title','Title'],['artist','Artist']].forEach(function (f) {
    var b = document.createElement('button')
    b.className = 'song-field' + (f[0] === 'all' ? ' active' : '')
    b.textContent = f[1]
    b.setAttribute('data-field', f[0])
    b.onclick = function () {
      songField = f[0]
      document.querySelectorAll('#songFields .song-field').forEach(function (x) {
        x.className = 'song-field' + (x.getAttribute('data-field') === songField ? ' active' : '')
      })
      renderSongs()
    }
    document.getElementById('songFields').appendChild(b)
  })

  function songMatch(s, q) {
    if (songField === 'number') return String(s.n).indexOf(q) !== -1
    if (songField === 'title') return s.t.toLowerCase().indexOf(q) !== -1
    if (songField === 'artist') return s.a.toLowerCase().indexOf(q) !== -1
    return (s.n + ' ' + s.t + ' ' + s.a).toLowerCase().indexOf(q) !== -1
  }

  function renderSongs() {
    if (tab !== 'songs') return
    var listEl = document.getElementById('songList')
    var q = document.getElementById('songSearch').value.trim().toLowerCase()
    if (!songBook.length) {
      listEl.innerHTML = '<p class="sg-note">Song list not received yet…</p>'
      return
    }
    var matches = q ? songBook.filter(function (s) { return songMatch(s, q) }) : songBook
    listEl.innerHTML = ''
    matches.slice(0, SONG_LIMIT).forEach(function (s) {
      var row = document.createElement('div')
      row.className = 'sg-item'
      row.innerHTML = '<span class="sg-num">#' + s.n + '</span>' +
        '<div class="sg-info"><strong>' + esc(s.t) + '</strong><span>' + esc(s.a) + '</span></div>'
      row.appendChild(btn(svg('play-fill'), 'sg-btn play', function () { cmd('play-number', s.n) }))
      row.appendChild(btn(svg('plus-lg'), 'sg-btn', function () { cmd('reserve-number', s.n); showFlash('Reserved: ' + s.t) }))
      listEl.appendChild(row)
    })
    if (matches.length > SONG_LIMIT) {
      var note = document.createElement('p')
      note.className = 'sg-note'
      note.textContent = 'Showing ' + SONG_LIMIT + ' of ' + matches.length + ' — refine your search.'
      listEl.appendChild(note)
    }
    if (!matches.length) listEl.innerHTML = '<p class="sg-note">No songs match.</p>'
  }

  function render(s) {
    if (s.hasSong) now.innerHTML = '<strong>' + esc(s.title) + '</strong><span>' + esc(s.artist) + '</span>'
    else now.innerHTML = '<em style="opacity:.5">Nothing playing</em>'
    toggle.innerHTML = svg(s.playing ? 'pause-fill' : 'play-fill')
    if (s.reserved) { qcount.className = 'count'; qcount.textContent = s.reserved }
    else qcount.className = 'count hidden'
    lastList = s.reservedList || []
    confirmIdx = null
    renderQueue()
    if (s.fx) renderMic(s.fx)
    if (s.messageSeq !== lastMsgSeq) { lastMsgSeq = s.messageSeq; showFlash(s.message) }
  }

  // ---- Mic / soundboard tab (synced with the host's Vocal effects panel) ----
  var MIC_MODES = ['Off', 'Clean', 'Karaoke', 'Pro']
  var FX_PRESET_NAMES = ['Off', 'Karaoke', 'Echo Mic', 'Concert Hall', 'Studio']
  var FX_SLIDERS = [
    { action: 'fx-volume', key: 'volume', label: 'Mic volume', min: 0, max: 2, step: 0.01, fmt: function (v) { return Math.round(v * 100) + '%' } },
    { action: 'fx-reverb', key: 'reverb', label: 'Reverb', min: 0, max: 1, step: 0.01, fmt: function (v) { return Math.round(v * 100) + '%' } },
    { action: 'fx-echo', key: 'echo', label: 'Echo', min: 0, max: 1, step: 0.01, fmt: function (v) { return Math.round(v * 100) + '%' } },
    { action: 'fx-echo-time', key: 'echoTime', label: 'Echo time', min: 0.08, max: 0.6, step: 0.01, fmt: function (v) { return Math.round(v * 1000) + 'ms' } },
    { action: 'fx-bass', key: 'bass', label: 'Bass', min: -12, max: 12, step: 1, fmt: function (v) { return (v > 0 ? '+' : '') + v + 'dB' } },
    { action: 'fx-treble', key: 'treble', label: 'Treble', min: -12, max: 12, step: 1, fmt: function (v) { return (v > 0 ? '+' : '') + v + 'dB' } }
  ]
  var modeBtns = {}, presetBtns = {}, sliderEls = {}
  var micHint = document.getElementById('micHint')
  var monitorBox = document.getElementById('monitorBox')

  MIC_MODES.forEach(function (m) {
    var b = document.createElement('button')
    b.className = 'mode' + (m === 'Off' ? ' off' : '')
    b.innerHTML = svg(m === 'Off' ? 'mic-mute-fill' : 'mic-fill') + m
    b.onclick = function () { cmd('mic-mode', m) }
    modeBtns[m] = b
    document.getElementById('micModes').appendChild(b)
  })
  FX_PRESET_NAMES.forEach(function (p) {
    var b = btn(p, 'preset', function () { cmd('fx-preset', p) })
    presetBtns[p] = b
    document.getElementById('fxPresets').appendChild(b)
  })
  FX_SLIDERS.forEach(function (s) {
    var wrap = document.createElement('label')
    wrap.className = 'fx-slider'
    wrap.innerHTML = '<span class="top"><span>' + s.label + '</span><em></em></span>'
    var input = document.createElement('input')
    input.type = 'range'; input.min = s.min; input.max = s.max; input.step = s.step
    input.oninput = function () {
      wrap.querySelector('em').textContent = s.fmt(Number(input.value))
      cmd(s.action, Number(input.value))
    }
    wrap.appendChild(input)
    sliderEls[s.key] = { input: input, val: wrap.querySelector('em'), fmt: s.fmt }
    document.getElementById('fxSliders').appendChild(wrap)
  })

  function renderMic(fx) {
    MIC_MODES.forEach(function (m) {
      modeBtns[m].className = 'mode' + (m === 'Off' ? ' off' : '') + (fx.mode === m ? ' active' : '')
    })
    FX_PRESET_NAMES.forEach(function (p) {
      presetBtns[p].className = 'preset' + (fx.preset === p ? ' active' : '')
    })
    monitorBox.checked = !!fx.monitor
    if (fx.mode === 'Off') micHint.textContent = 'Mic is off — no speaker feedback.'
    else if (fx.monitor) micHint.textContent = 'Live monitor is on — keep the mic away from the speakers.'
    else micHint.textContent = ''
    FX_SLIDERS.forEach(function (s) {
      var el = sliderEls[s.key]
      var v = fx[s.key]
      if (typeof v !== 'number') return
      if (document.activeElement !== el.input) el.input.value = v
      el.val.textContent = el.fmt(v)
    })
  }

  function renderQueue() {
    if (tab !== 'queue') return
    if (!lastList.length) { queueTab.innerHTML = '<p class="q-empty">No reserved songs. Dial a number and tap "Reserve".</p>'; return }
    queueTab.innerHTML = ''
    lastList.forEach(function (item, i) {
      var row = document.createElement('div'); row.className = 'q-item'
      row.innerHTML = '<span class="q-num">#' + item.number + '</span>' +
        '<div class="q-info"><strong>' + esc(item.title) + '</strong><span>' + esc(item.artist) + '</span></div>'
      if (confirmIdx === i) {
        row.insertAdjacentHTML('beforeend', '<span class="q-confirm">Remove?</span>')
        row.appendChild(btn('Yes', 'q-btn yes', function () { cmd('reserve-remove', i); confirmIdx = null; renderQueue() }))
        row.appendChild(btn('No', 'q-btn no', function () { confirmIdx = null; renderQueue() }))
      } else {
        var up = btn(svg('caret-up-fill'), 'q-btn', function () { cmd('reserve-up', i) }); if (i === 0) up.disabled = true
        var dn = btn(svg('caret-down-fill'), 'q-btn', function () { cmd('reserve-down', i) }); if (i === lastList.length - 1) dn.disabled = true
        row.appendChild(up); row.appendChild(dn)
        row.appendChild(btn(svg('x-lg'), 'q-btn del', function () { confirmIdx = i; renderQueue() }))
      }
      queueTab.appendChild(row)
    })
  }
  function btn(html, cls, fn) {
    var b = document.createElement('button'); b.className = cls; b.innerHTML = html; b.onclick = fn; return b
  }

  function showFlash(m) {
    flashEl.textContent = m; flashEl.className = 'flash show'
    if (flashTimer) clearTimeout(flashTimer)
    flashTimer = setTimeout(function () { flashEl.className = 'flash' }, 2600)
  }
  function cmd(action, value) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'cmd', action: action, value: value }))
  }
  function esc(str) {
    return String(str).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
    })
  }

  // ---- Phone-as-mic: local monitor + stream PCM (Int16 @ 16 kHz) to host ----
  var micCtx = null, micStream = null, micNode = null, micSource = null, micOn = false
  var TARGET_RATE = 16000
  var singBtn = document.getElementById('singBtn')
  var singLabel = document.getElementById('singLabel')
  var singHint = document.getElementById('singHint')

  function toggleMic() { micOn ? stopMic() : startMic() }

  function startMic() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      singHint.textContent = 'Mic needs a secure (https) page — open the QR link, accept the security warning.'
      return
    }
    navigator.mediaDevices.getUserMedia({
      // Echo cancellation + noise suppression tame the phone-speaker→mic
      // feedback loop when monitoring without earphones.
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    }).then(function (stream) {
      micStream = stream
      // This phone is a PURE mic: it captures and streams to the host, but
      // plays NO audio itself — so it cannot feed back. All sound (music +
      // your voice) comes out of the host (laptop/tablet) speakers.
      var AC = window.AudioContext || window.webkitAudioContext
      micCtx = new AC()
      micSource = micCtx.createMediaStreamSource(stream)
      // Capture path: downsample to 16 kHz mono Int16 and stream to the host.
      // The processor is routed through a MUTED gain so onaudioprocess fires
      // without any sound leaving the phone. Small buffer = lower latency.
      var bufSize = 512
      micNode = micCtx.createScriptProcessor(bufSize, 1, 1)
      var silent = micCtx.createGain(); silent.gain.value = 0
      micSource.connect(micNode)
      micNode.connect(silent)
      silent.connect(micCtx.destination)
      var ratio = micCtx.sampleRate / TARGET_RATE
      micNode.onaudioprocess = function (e) {
        if (!micOn || !ws || ws.readyState !== 1) return
        var input = e.inputBuffer.getChannelData(0)
        var outLen = Math.floor(input.length / ratio)
        var pcm = new Int16Array(outLen)
        for (var i = 0; i < outLen; i++) {
          var s = input[Math.floor(i * ratio)]
          s = s < -1 ? -1 : s > 1 ? 1 : s
          pcm[i] = s * 32767
        }
        ws.send(pcm.buffer)
      }
      micOn = true
      singBtn.className = 'sing on'
      singLabel.textContent = 'Singing — tap to stop'
      singHint.textContent = 'This phone is now the mic. Your voice comes out of the karaoke speakers, not the phone.'
      cmd('phone-mic-on')
    }).catch(function () {
      singHint.textContent = 'Mic permission denied. Allow microphone access and try again.'
    })
  }

  function stopMic() {
    micOn = false
    cmd('phone-mic-off')
    try { if (micNode) micNode.onaudioprocess = null } catch (e) {}
    try { if (micStream) micStream.getTracks().forEach(function (t) { t.stop() }) } catch (e) {}
    try { if (micCtx) micCtx.close() } catch (e) {}
    micCtx = micStream = micNode = micSource = null
    singBtn.className = 'sing'
    singLabel.textContent = 'Sing — use this phone as mic'
    singHint.textContent = ''
  }

  if (!token) status.textContent = 'Missing pairing token — scan the QR again.'
  else connect()
</script>
</body>
</html>
